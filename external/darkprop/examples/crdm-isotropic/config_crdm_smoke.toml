id = "crdm-smoke"

[input]
dm_model = "SIHelm"
medium_model = "HomoEarth"
type = "flux"
mchi_file = "./mchi.txt"
sigma_file = "./sigma.txt"
[input.flux]
flux_file = "./surface_flux.txt"

[output]
outdir = "./out_smoke"
maximal_simulation = 20000
sample_size = 100
depth = [1.4]  # [km]
chunk_size = 100
full_tracks = 0
[output.log]
screen_log_lag = 100

[numerical]
random_seed = 1
interp_Tmin = 1e-20
interp_num = 10000
